<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MathBot Visual</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f7f4ee;
      --accent: #e8521a;
      --accent2: #2563c4;
      --text: #1a1a2e;
      --muted: #7a7a8c;
      --border: rgba(0,0,0,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(232,82,26,0.06) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(37,99,196,0.06) 0%, transparent 50%);
    }
    header {
      width:100%; max-width:720px;
      padding: 28px 20px 0;
      animation: slideDown 0.6s ease;
    }
    .logo-row { display:flex; align-items:center; gap:12px; margin-bottom:4px; }
    .logo-icon {
      width:46px; height:46px; background:var(--accent);
      border-radius:13px; display:flex; align-items:center; justify-content:center;
      font-size:22px; box-shadow:4px 4px 0 var(--text); color:white; flex-shrink:0;
    }
    h1 { font-family:'DM Serif Display',serif; font-size:26px; }
    h1 span { color:var(--accent); font-style:italic; }
    .tagline { color:var(--muted); font-size:12px; margin-left:58px; letter-spacing:.04em; }

    .suggestions {
      width:100%; max-width:720px;
      padding: 16px 20px 0;
      display:flex; flex-wrap:wrap; gap:8px;
      animation: fadeUp 0.7s ease 0.2s both;
    }
    .suggestion-btn {
      background:white; border:1.5px solid var(--border);
      border-radius:20px; padding:6px 13px;
      font-size:12.5px; font-family:'Nunito',sans-serif;
      color:var(--text); cursor:pointer; transition:all .2s;
      box-shadow:2px 2px 0 rgba(0,0,0,0.06);
    }
    .suggestion-btn:hover {
      background:var(--accent); color:white; border-color:var(--accent);
      transform:translateY(-1px); box-shadow:3px 3px 0 rgba(232,82,26,0.3);
    }

    .chat-wrapper {
      width:100%; max-width:720px; flex:1;
      display:flex; flex-direction:column;
      padding: 12px 20px;
    }
    .messages {
      flex:1; overflow-y:auto;
      display:flex; flex-direction:column; gap:14px;
      padding:12px 0;
      min-height:280px;
      max-height: calc(100vh - 300px);
      scrollbar-width:thin; scrollbar-color:rgba(0,0,0,0.1) transparent;
    }
    .message { display:flex; gap:10px; animation:fadeUp 0.3s ease; }
    .message.user { flex-direction:row-reverse; }
    .avatar {
      width:32px; height:32px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; flex-shrink:0; margin-top:2px;
    }
    .avatar.bot { background:var(--accent); color:white; box-shadow:2px 2px 0 rgba(0,0,0,0.15); }
    .avatar.user { background:var(--text); color:white; box-shadow:2px 2px 0 rgba(0,0,0,0.15); }

    .bubble {
      max-width:78%;
      padding:12px 15px;
      font-size:14.5px; line-height:1.65;
      white-space:pre-wrap;
    }
    .bubble.bot {
      background:white; border:1.5px solid var(--border);
      border-radius:4px 16px 16px 16px;
      box-shadow:3px 3px 0 rgba(0,0,0,0.05);
    }
    .bubble.user {
      background:var(--text); color:white;
      border-radius:16px 4px 16px 16px;
      box-shadow:3px 3px 0 rgba(0,0,0,0.15);
    }
    .bubble.bot code {
      font-family:'DM Mono',monospace;
      background:#f0ede6; border:1px solid rgba(0,0,0,0.08);
      padding:2px 6px; border-radius:5px;
      font-size:12.5px; color:var(--accent); font-weight:500;
    }

    .visual-block {
      margin-top:12px;
      background:#fafaf7;
      border:1.5px solid var(--border);
      border-radius:10px;
      padding:14px;
      text-align:center;
    }
    .visual-block canvas { max-width:100%; border-radius:8px; }
    .visual-label {
      font-size:11px; color:var(--muted);
      margin-top:6px; letter-spacing:.04em;
      font-family:'DM Mono',monospace;
    }

    .dots-wrap { display:flex; gap:10px; align-items:center; }
    .dots {
      display:flex; gap:5px; padding:13px 16px;
      background:white; border:1.5px solid var(--border);
      border-radius:4px 16px 16px 16px;
      box-shadow:3px 3px 0 rgba(0,0,0,0.05);
    }
    .dot {
      width:7px; height:7px; border-radius:50%;
      background:var(--muted); animation:bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2){animation-delay:.2s;} .dot:nth-child(3){animation-delay:.4s;}

    .input-area {
      background:white; border:2px solid var(--text);
      border-radius:14px; padding:11px 13px;
      display:flex; gap:10px; align-items:flex-end;
      box-shadow:4px 4px 0 rgba(0,0,0,0.12); margin-top:8px;
      transition:box-shadow .2s;
    }
    .input-area:focus-within { box-shadow:4px 4px 0 var(--accent); }
    textarea {
      flex:1; border:none; outline:none;
      font-family:'Nunito',sans-serif; font-size:14.5px;
      color:var(--text); resize:none; background:transparent;
      max-height:100px; overflow-y:auto; line-height:1.5;
    }
    textarea::placeholder { color:var(--muted); }
    .send-btn {
      width:36px; height:36px; background:var(--text);
      border:none; border-radius:9px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:15px; color:white; transition:all .2s; flex-shrink:0;
      box-shadow:2px 2px 0 rgba(0,0,0,0.2);
    }
    .send-btn:hover:not(:disabled) {
      background:var(--accent); transform:translateY(-1px);
      box-shadow:3px 3px 0 rgba(232,82,26,0.3);
    }
    .send-btn:disabled { background:#ccc; cursor:not-allowed; box-shadow:none; }
    .hint { text-align:center; color:var(--muted); font-size:11px; margin-top:8px; margin-bottom:12px; }

    @keyframes slideDown { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
  </style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo-icon">∑</div>
    <h1>Math<span>Bot</span> <span style="font-size:16px;color:var(--muted);font-style:normal;">Visual</span></h1>
  </div>
  <p class="tagline">Tu tutor de matemáticas · Con figuras, gráficas y ejemplos visuales</p>
</header>

<div class="suggestions">
  <button class="suggestion-btn" onclick="sendSuggestion('Explícame el Teorema de Pitágoras')">📐 Pitágoras</button>
  <button class="suggestion-btn" onclick="sendSuggestion('¿Cómo se grafica una función lineal?')">📈 Función lineal</button>
  <button class="suggestion-btn" onclick="sendSuggestion('Explícame qué es un círculo y su área')">⭕ Círculo</button>
  <button class="suggestion-btn" onclick="sendSuggestion('Muéstrame una gráfica de seno y coseno')">〰️ Seno y coseno</button>
  <button class="suggestion-btn" onclick="sendSuggestion('¿Qué es una ecuación cuadrática? Muéstrame la parábola')">🔢 Cuadrática</button>
  <button class="suggestion-btn" onclick="sendSuggestion('Explícame fracciones con un ejemplo visual')">🍕 Fracciones</button>
</div>

<div class="chat-wrapper">
  <div class="messages" id="messages">
    <div class="message">
      <div class="avatar bot">∑</div>
      <div class="bubble bot">¡Hola! Soy <strong>MathBot Visual</strong> 🎉

Explico matemáticas con figuras, gráficas y dibujos, no solo texto. ¿Qué tema quieres aprender hoy?</div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Pregunta algo de matemáticas..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <p class="hint">Enter para enviar · Shift+Enter para nueva línea</p>
</div>

<script>
const SYSTEM_PROMPT = `Eres MathBot Visual, un tutor de matemáticas para estudiantes universitarios mexicanos.

REGLA PRINCIPAL: SOLO respondes preguntas de matemáticas. Si preguntan otra cosa, responde en JSON con tipo "ninguno".

FORMATO DE RESPUESTA — MUY IMPORTANTE:
Siempre responde ÚNICAMENTE en JSON válido con esta estructura:
{
  "texto": "Tu explicación clara con pasos numerados y ejemplos simples. Usa \\n para saltos de línea.",
  "visual": {
    "tipo": "ninguno|triangulo|circulo|rectangulo|grafica_lineal|grafica_barras|parabola|seno_coseno|fraccion|angulos|pitagoras",
    "datos": {}
  }
}

TIPOS DE VISUAL y sus datos:
- pitagoras: {"a": 3, "b": 4, "c": 5}
- triangulo: {"base": 6, "altura": 4, "label": "Base=6, Altura=4"}
- circulo: {"radio": 5, "label": "Radio=5"}
- rectangulo: {"ancho": 8, "alto": 5, "label": "8x5"}
- fraccion: {"numerador": 3, "denominador": 4, "label": "3/4"}
- angulos: {"angulos": [60, 60, 60], "labels": ["60°","60°","60°"]}
- grafica_lineal: {"puntos": [{"x":-3,"y":-5},{"x":0,"y":1},{"x":3,"y":7}], "label": "y = 2x + 1"}
- parabola: {"a": 1, "b": 0, "c": -4, "label": "y = x² - 4"}
- grafica_barras: {"labels":["A","B","C"], "valores":[10,25,18], "label":"Ejemplo"}
- seno_coseno: {"funciones": ["seno","coseno"], "label": "Seno y Coseno"}
- ninguno: {}

REGLAS:
- Elige siempre el visual MÁS apropiado
- Usa datos pedagógicos simples
- Explica con pasos numerados
- Responde SOLO JSON válido, sin texto extra, sin backticks, sin markdown`;

let history = [];
let chartInstances = {};

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  addMessage('user', text, null);
  input.value = ''; input.style.height = 'auto';
  history.push({ role: 'user', content: text });
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history,
      })
    });
    const data = await res.json();
    const raw = data.content?.map(b => b.text||'').join('') || '{}';

    let parsed;
    try {
      const clean = raw.replace(/```json|```/g,'').trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      parsed = { texto: raw, visual: { tipo: 'ninguno', datos: {} } };
    }

    history.push({ role: 'assistant', content: raw });
    hideTyping();
    addMessage('bot', parsed.texto, parsed.visual);
  } catch(e) {
    hideTyping();
    addMessage('bot', '⚠️ Error de conexión. Intenta de nuevo.', null);
  }
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('input').focus();
}

function sendSuggestion(t) { document.getElementById('input').value = t; sendMessage(); }

function addMessage(role, text, visual) {
  const container = document.getElementById('messages');
  const msgId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatarEl = `<div class="avatar ${role}">${role==='bot'?'∑':'👤'}</div>`;
  const textHtml = escapeHtml(text||'');

  let visualHtml = '';
  if (role === 'bot' && visual && visual.tipo && visual.tipo !== 'ninguno') {
    visualHtml = `<div class="visual-block" id="vis_${msgId}">
      <canvas id="canvas_${msgId}" width="400" height="260"></canvas>
      <div class="visual-label" id="label_${msgId}"></div>
    </div>`;
  }

  div.innerHTML = `${avatarEl}<div class="bubble ${role}">${textHtml}${visualHtml}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;

  if (role === 'bot' && visual && visual.tipo !== 'ninguno') {
    setTimeout(() => drawVisual(msgId, visual), 150);
  }
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/`([^`]+)`/g,'<code>$1</code>');
}

function drawVisual(id, visual) {
  const canvas = document.getElementById('canvas_' + id);
  const labelEl = document.getElementById('label_' + id);
  if (!canvas) return;
  const tipo = visual.tipo;
  const d = visual.datos || {};

  if (['grafica_lineal','parabola','seno_coseno','grafica_barras'].includes(tipo)) {
    drawChart(id, tipo, d, labelEl);
    return;
  }

  canvas.width = 400; canvas.height = 260;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,400,260);

  if (tipo === 'pitagoras') drawPitagoras(ctx, d, labelEl);
  else if (tipo === 'triangulo') drawTriangulo(ctx, d, labelEl);
  else if (tipo === 'circulo') drawCirculo(ctx, d, labelEl);
  else if (tipo === 'rectangulo') drawRectangulo(ctx, d, labelEl);
  else if (tipo === 'fraccion') drawFraccion(ctx, d, labelEl);
  else if (tipo === 'angulos') drawAngulos(ctx, d, labelEl);
}

function drawPitagoras(ctx, d, labelEl) {
  const a = d.a||3, b = d.b||4, c = d.c||5;
  const scale = Math.min(140/Math.max(a,b), 140);
  const ox=70, oy=200;
  ctx.fillStyle='rgba(37,99,196,0.12)'; ctx.strokeStyle='#1a1a2e'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ox+b*scale,oy); ctx.lineTo(ox,oy-a*scale); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.strokeStyle='#e8521a'; ctx.lineWidth=1.5;
  ctx.strokeRect(ox, oy-14, 14, 14);
  ctx.font='bold 14px Nunito'; ctx.fillStyle='#e8521a';
  ctx.fillText(`a = ${a}`, ox-52, oy-a*scale/2+5);
  ctx.fillStyle='#2563c4';
  ctx.fillText(`b = ${b}`, ox+b*scale/2-15, oy+22);
  ctx.fillStyle='#1a1a2e';
  ctx.fillText(`c = ${c}`, ox+b*scale/2+10, oy-a*scale/2-10);
  ctx.font='13px Nunito'; ctx.fillStyle='#7a7a8c';
  ctx.fillText(`${a}² + ${b}² = ${c}²  →  ${a*a} + ${b*b} = ${c*c}`, 40, 248);
  if(labelEl) labelEl.textContent = `Triángulo rectángulo: a=${a}, b=${b}, c=${c}`;
}

function drawTriangulo(ctx, d, labelEl) {
  const base=d.base||6, altura=d.altura||4;
  const sc = Math.min(200/base, 140/altura);
  const ox=80, oy=210;
  const bpx=base*sc, apx=altura*sc;
  ctx.fillStyle='rgba(232,82,26,0.15)'; ctx.strokeStyle='#e8521a'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ox+bpx,oy); ctx.lineTo(ox+bpx/2,oy-apx); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.setLineDash([5,4]); ctx.strokeStyle='#2563c4'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(ox+bpx/2,oy); ctx.lineTo(ox+bpx/2,oy-apx); ctx.stroke();
  ctx.setLineDash([]);
  ctx.font='bold 13px Nunito'; ctx.fillStyle='#2563c4';
  ctx.fillText(`h=${altura}`, ox+bpx/2+6, oy-apx/2);
  ctx.fillStyle='#e8521a'; ctx.fillText(`b=${base}`, ox+bpx/2-15, oy+20);
  const area=(base*altura/2).toFixed(1);
  ctx.font='13px Nunito'; ctx.fillStyle='#1a1a2e';
  ctx.fillText(`Área = ½ × ${base} × ${altura} = ${area}`, 60, 250);
  if(labelEl) labelEl.textContent = d.label||`Base=${base}, Altura=${altura}, Área=${area}`;
}

function drawCirculo(ctx, d, labelEl) {
  const r=d.radio||5;
  const scale=Math.min(80/r, 80);
  const cx=200, cy=125, rpx=r*scale;
  ctx.fillStyle='rgba(37,99,196,0.15)'; ctx.strokeStyle='#2563c4'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(cx,cy,rpx,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.strokeStyle='#e8521a'; ctx.lineWidth=1.8; ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+rpx,cy); ctx.stroke();
  ctx.setLineDash([]);
  ctx.font='bold 13px Nunito'; ctx.fillStyle='#e8521a';
  ctx.fillText(`r = ${r}`, cx+rpx/2-10, cy-8);
  const area=(Math.PI*r*r).toFixed(2), per=(2*Math.PI*r).toFixed(2);
  ctx.font='13px Nunito'; ctx.fillStyle='#1a1a2e';
  ctx.fillText(`Área = π × r² = ${area}`, 80, 220);
  ctx.fillText(`Perímetro = 2π × r = ${per}`, 80, 242);
  if(labelEl) labelEl.textContent = d.label||`Radio=${r}`;
}

function drawRectangulo(ctx, d, labelEl) {
  const w=d.ancho||8, h=d.alto||5;
  const sc=Math.min(180/w, 100/h);
  const ox=70, oy=60, wpx=w*sc, hpx=h*sc;
  ctx.fillStyle='rgba(232,82,26,0.12)'; ctx.strokeStyle='#e8521a'; ctx.lineWidth=2.5;
  ctx.fillRect(ox,oy,wpx,hpx); ctx.strokeRect(ox,oy,wpx,hpx);
  ctx.font='bold 13px Nunito'; ctx.fillStyle='#e8521a';
  ctx.fillText(`${w}`, ox+wpx/2-8, oy+hpx+20);
  ctx.fillStyle='#2563c4'; ctx.fillText(`${h}`, ox-28, oy+hpx/2+5);
  const area=w*h, per=2*(w+h);
  ctx.font='13px Nunito'; ctx.fillStyle='#1a1a2e';
  ctx.fillText(`Área = ${w} × ${h} = ${area}`, ox, oy+hpx+45);
  ctx.fillText(`Perímetro = 2×(${w}+${h}) = ${per}`, ox, oy+hpx+65);
  if(labelEl) labelEl.textContent = d.label||`${w}×${h}`;
}

function drawFraccion(ctx, d, labelEl) {
  const num=d.numerador||3, den=d.denominador||4;
  const totalW=280, sliceW=totalW/den, h=70, ox=60, oy=70;
  for(let i=0;i<den;i++){
    ctx.fillStyle = i<num ? 'rgba(232,82,26,0.8)' : 'rgba(200,200,200,0.3)';
    ctx.fillRect(ox+i*sliceW+2, oy, sliceW-4, h);
    ctx.strokeStyle='#1a1a2e'; ctx.lineWidth=1.5;
    ctx.strokeRect(ox+i*sliceW+2, oy, sliceW-4, h);
  }
  ctx.font='bold 26px DM Serif Display'; ctx.fillStyle='#e8521a'; ctx.textAlign='center';
  ctx.fillText(`${num}`, 200, 185);
  ctx.fillStyle='#1a1a2e'; ctx.fillRect(165,190,70,2);
  ctx.fillText(`${den}`, 200, 218);
  ctx.font='13px Nunito'; ctx.fillStyle='#7a7a8c';
  ctx.fillText(`${num} de cada ${den} partes`, 200, 248);
  ctx.textAlign='left';
  if(labelEl) labelEl.textContent = d.label||`${num}/${den}`;
}

function drawAngulos(ctx, d, labelEl) {
  const angles=d.angulos||[60,60,60], labels=d.labels||angles.map(a=>a+'°');
  const cx=200, cy=180, r=110;
  const colors=['#e8521a','#2563c4','#16a34a','#d97706'];
  let start=-Math.PI/2;
  angles.forEach((ang,i)=>{
    const rad=ang*Math.PI/180;
    ctx.fillStyle=colors[i%colors.length]+'33';
    ctx.strokeStyle=colors[i%colors.length];
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,start+rad); ctx.closePath();
    ctx.fill(); ctx.stroke();
    const mid=start+rad/2;
    ctx.font='bold 13px Nunito'; ctx.fillStyle=colors[i%colors.length];
    ctx.fillText(labels[i], cx+Math.cos(mid)*65-12, cy+Math.sin(mid)*65+5);
    start+=rad;
  });
  if(labelEl) labelEl.textContent = `Ángulos: ${labels.join(', ')}`;
}

function drawChart(id, tipo, d, labelEl) {
  const canvas = document.getElementById('canvas_' + id);
  if (!canvas) return;
  canvas.width=400; canvas.height=260;
  const ctx2 = canvas.getContext('2d');
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }

  if (tipo === 'grafica_lineal') {
    const pts = d.puntos || [{x:-3,y:-5},{x:0,y:1},{x:3,y:7}];
    chartInstances[id] = new Chart(ctx2, {
      type:'line',
      data:{ datasets:[{ label:d.label||'Función', data:pts, borderColor:'#e8521a', backgroundColor:'rgba(232,82,26,0.1)', tension:0, pointRadius:5, pointBackgroundColor:'#e8521a', fill:true }]},
      options:{ responsive:false, scales:{ x:{type:'linear',title:{display:true,text:'x'}}, y:{title:{display:true,text:'y'}}}, plugins:{legend:{display:true}}}
    });
  } else if (tipo === 'parabola') {
    const a=d.a??1, b=d.b??0, c=d.c??0;
    const pts=[]; for(let x=-5;x<=5;x+=0.5) pts.push({x, y:+(a*x*x+b*x+c).toFixed(2)});
    chartInstances[id] = new Chart(ctx2, {
      type:'line',
      data:{ datasets:[{ label:d.label||'Parábola', data:pts, borderColor:'#2563c4', backgroundColor:'rgba(37,99,196,0.1)', tension:0.3, pointRadius:0, fill:true }]},
      options:{ responsive:false, scales:{ x:{type:'linear',title:{display:true,text:'x'}}, y:{title:{display:true,text:'y'}}}, plugins:{legend:{display:true}}}
    });
  } else if (tipo === 'seno_coseno') {
    const fns = d.funciones||['seno'];
    const datasets=[];
    if(fns.includes('seno')) {
      const pts=[]; for(let x=-360;x<=360;x+=10) pts.push({x, y:+Math.sin(x*Math.PI/180).toFixed(3)});
      datasets.push({ label:'Seno', data:pts, borderColor:'#e8521a', pointRadius:0, tension:0.3, fill:false });
    }
    if(fns.includes('coseno')) {
      const pts=[]; for(let x=-360;x<=360;x+=10) pts.push({x, y:+Math.cos(x*Math.PI/180).toFixed(3)});
      datasets.push({ label:'Coseno', data:pts, borderColor:'#2563c4', pointRadius:0, tension:0.3, fill:false });
    }
    chartInstances[id] = new Chart(ctx2, {
      type:'line', data:{ datasets },
      options:{ responsive:false, scales:{ x:{type:'linear',title:{display:true,text:'Grados'}}, y:{min:-1.5, max:1.5, title:{display:true,text:'Valor'}}}, plugins:{legend:{display:true}}}
    });
  } else if (tipo === 'grafica_barras') {
    chartInstances[id] = new Chart(ctx2, {
      type:'bar',
      data:{ labels:d.labels||[], datasets:[{ label:d.label||'', data:d.valores||[], backgroundColor:['#e8521a','#2563c4','#16a34a','#d97706','#7c3aed'] }]},
      options:{ responsive:false, plugins:{legend:{display:false}}}
    });
  }
  if(labelEl) labelEl.textContent = d.label||'';
}

function showTyping() {
  const c=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='message'; d.id='typing';
  d.innerHTML=`<div class="avatar bot">∑</div><div class="dots-wrap"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  c.appendChild(d); c.scrollTop=c.scrollHeight;
}
function hideTyping() { const e=document.getElementById('typing'); if(e) e.remove(); }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
</script>
